
[mcu orbitoolO2]
serial:/dev/serial/by-id/usb-Klipper_stm32f042x6_Orbitool_O2-if00
baud: 250000
restart_method: command

###########################################################################################
###################################### RUN LED config #####################################
###########################################################################################

[output_pin O2run_led]
pin = orbitoolO2:PB8
value: 1
shutdown_value: 0

###########################################################################################
###################################### Extruder config ####################################
###########################################################################################

# you may need to change some setting based on the hotend type you have

[extruder]
step_pin = orbitoolO2:PB7
dir_pin = orbitoolO2:PB6 #orbiter 2
enable_pin = !orbitoolO2:PB4
microsteps: 16 #32
rotation_distance: 4.69 # Orbiter v2
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.75
max_extrude_only_distance: 500.0
max_extrude_only_velocity: 120
max_extrude_cross_section: 5

#min_extrude_temp = 30
max_power: 0.995 # limit heater power to 99.5% to enable autorecovery from short detection
pwm_cycle_time: 0.00500

heater_pin = orbitoolO2:PA0
sensor_pin = orbitoolO2:PA3
pullup_resistor: 2200
sensor_type: ATC Semitec 104NT-4-R025H42G # hotend speciffic
min_temp: 10
max_temp: 300 # hotend speciffic
min_extrude_temp: 180
control: pid # hotend speciffic
pid_Kp: 21.647
pid_Ki: 0.949 
pid_Kd: 123.391

#####################################################################
#   Pressure Advance
#####################################################################

##  Try to keep pressure_advance below 1.0
pressure_advance: 0.036
##  Default is 0.040, leave stock
pressure_advance_smooth_time: 0.04

[tmc2209 extruder]
uart_pin: orbitoolO2:PB5
interpolate: true
run_current: 0.8 # Orbiter 2
hold_current: 0.100
sense_resistor: 0.11
stealthchop_threshold: 0
driver_TBL: 0
driver_HEND: 6
driver_HSTRT: 7
driver_TOFF: 4

[firmware_retraction]
retract_length: 1.2
#   The length of filament (in mm) to retract when G10 is activated,
#   and to unretract when G11 is activated (but see
#   unretract_extra_length below). The default is 0 mm.
retract_speed: 120
#   The speed of retraction, in mm/s. The default is 20 mm/s.
unretract_extra_length: 0.0
#   The length (in mm) of *additional* filament to add when
#   unretracting.
unretract_speed: 120
#   The speed of unretraction, in mm/s. The default is 10 mm/s.

[adc_temperature HOT_P]
#temperature1:5 # value in Ampere
temperature1:120 # value in Watts
#voltage1:1.32
voltage1:1.91 
#temperature2:10 # value in Ampere
temperature2:240 # value in Watts
voltage2:3.82 
#voltage2:2.64

[temperature_sensor Hotend_power]
sensor_pin: orbitoolO2:PA2 
sensor_type: HOT_P

###########################################################################################
###################################### Fan's config #######################################
###########################################################################################

[heater_fan hotend_Fan]
pin: !orbitoolO2:PA9  
tachometer_pin: orbitoolO2:PA8
tachometer_ppr: 2
tachometer_poll_interval: 0.0005
heater: extruder
cycle_time: 0.0001 #10KHz PWM frequency
heater_temp: 75
fan_speed: 0.6
hardware_pwm: false
shutdown_speed: 0.0
max_power: 1.0 #setup specific

[multi_pin fan_pins]
pins: orbitoolO2:PA10, orbitoolO2:PB1

[fan]
pin:multi_pin: fan_pins
max_power: 0.995
shutdown_speed: 0.0
cycle_time: 0.1
kick_start_time: 0.2
hardware_pwm: False
off_below: 0.2

