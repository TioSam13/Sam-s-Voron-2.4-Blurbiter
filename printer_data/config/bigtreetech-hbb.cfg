[mcu HBB]
serial: /dev/serial/by-id/usb-Klipper_rp2040_454741505B8722AA-if00

[neopixel HBB_LED]
pin: HBB: gpio20
chain_count: 7
color_order: GRB
initial_RED: 0
initial_GREEN: 0
initial_BLUE: 1

[gcode_button key1]    #PREHEAT_ABS
pin: HBB: gpio25
press_gcode:

release_gcode:     
  CG28
  G90
  G0 X{ printer.toolhead.axis_maximum.x/2 } Y{ printer.toolhead.axis_maximum.y/2 } F7200 
  G1 Z 50 F2000
  M104 S150
  M140 S100
  SET_LED LED=HBB_LED RED=1 GREEN=0 BLUE=0 INDEX=1 

[gcode_button key2]    #PREHEAT_PLA
pin: HBB: gpio26
press_gcode:

release_gcode:     
  CG28
  G90
  G0 X{ printer.toolhead.axis_maximum.x/2 } Y{ printer.toolhead.axis_maximum.y/2 } F7200 
  G1 Z 50 F2000
  M104 S150
  M140 S60
  SET_LED LED=HBB_LED RED=1 GREEN=0 BLUE=0 INDEX=2  

[gcode_button key3]    #PRINT_START_NOZZLE_CLEAN
pin: HBB: gpio27
press_gcode:

release_gcode:
  PRINT_START_NOZZLE_CLEAN
  SET_LED LED=HBB_LED RED=1 GREEN=0 BLUE=1 INDEX=3 

[gcode_button key4]    #G32
pin: HBB: gpio19
press_gcode:

release_gcode:     
  G32
  SET_LED LED=HBB_LED RED=0 GREEN=1 BLUE=0 INDEX=4 

[gcode_button key5]    #PRESENT_TOOLHEAD
pin: HBB: gpio18
press_gcode:

release_gcode:     
  PRESENT_TOOLHEAD
  SET_LED LED=HBB_LED RED=1 GREEN=0.65 BLUE=0 INDEX=5 

[gcode_button key6]    #filament_change_on_purge_bucket
pin: HBB: gpio13
press_gcode:

release_gcode:     
  filament_change_on_purge_bucket
  SET_LED LED=HBB_LED RED=0 GREEN=1 BLUE=1 INDEX=6 

[gcode_button key7]    #DAYLIGHT_TOGGLE
pin: HBB: gpio12
press_gcode:

release_gcode:
  DAYLIGHT_TOGGLE

#####################################################################
#   Adjust White LED button on BTT HBB board   DAYLIGHT_TOGGLE
#####################################################################

[gcode_macro DAYLIGHT_TOGGLE]
description: Toggle Daylight
gcode:
  {% if printer['output_pin Daylight'].value == 0 %} DAYLIGHT_ON {% else %} DAYLIGHT_OFF {% endif %}

#####################################################################

[gcode_macro DAYLIGHT_ON]
description: Toggle Daylight
gcode:
 SET_PIN PIN=Daylight VALUE=1.00              # Sets Daylight to MAX
 SET_LED LED=HBB_LED RED=1 GREEN=1 BLUE=0 INDEX=7 

#####################################################################

[gcode_macro DAYLIGHT_OFF]
description: Toggle Daylight
gcode:
 SET_PIN PIN=Daylight VALUE=0.00              # Sets Daylight to ZERO
 SET_LED LED=HBB_LED RED=1 GREEN=1 BLUE=1 INDEX=7 

